name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
      
      - name: Install & Test Script
        run: |
          npm ci
          npm run self-test
        working-directory: ./script

      - name: Run Preparation Script
        run: npm start -- ci
        working-directory: ./script

      - name: Upload Workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace-artifact
          path: ./
          retention-days: 1

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo  stable fmt --all -- --check
      - name: Clippy
        run: cargo  stable clippy -- -D warnings

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install nightly for Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Unit Test
        run: cargo  stable test --verbose
      - name: Run Miri
        run: |
          cargo  nightly miri setup
          cargo  nightly miri test --lib
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks"

  benchmark:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      
      - name: Run benchmark
        run: cargo  stable bench
      
      - name: Integration Test
        run: |
          npm ci
          npm run compiler-test
        working-directory: ./script

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: ./target/criterion
          retention-days: 1

  build-site:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build website
        run: |
          npm ci
          npm run build
        working-directory: ./website
      - name: Upload Website Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: ./website/dist
          retention-days: 1

  deploy:
    needs: [lint, test, benchmark, build-site]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for branch logic)
        uses: actions/checkout@v4

      - name: Setup out directory
        run: mkdir -p ./out

      - name: Download Bench Results
        uses: actions/download-artifact@v4
        with:
          name: bench-results
          path: ./out/benches

      - name: Download Website Dist
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: ./out

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          commit_message: "[bot] update results ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
