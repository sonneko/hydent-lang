name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install script dependencies
        run: npm ci
        working-directory: ./script

      - name: Test script
        run: npm run self-test
        working-directory: ./script

      # - name: Install LLVM 21
      #   run: |
      #     wget https://apt.llvm.org/llvm.sh
      #     chmod  x llvm.sh
      #     sudo ./llvm.sh 21
      #     sudo apt-get install -y libpolly-21-dev
      #     rm ./llvm.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Run script
        run: npm start -- ci
        working-directory: ./script

      - name: Save
        uses: actions/upload-artifact@v4
        with:
          name: workspace-artifact
          path: ./
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Clippy
        run: cargo +stable clippy -- -D warnings

  unit-test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Unit Test
        run: cargo +stable test --verbose

      - name: Miri test
        run: |
          cargo +nightly miri setup
          cargo +nightly miri test --lib

  integration-test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install script dependencies
        run: npm ci
        working-directory: ./script

      - name: Integration Test
        run: npm run compiler-test
        working-directory: ./script

  benchmark:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup out directory
        run: mkdir -p ./out

      - name: Run benchmark
        run: cargo +stable bench

      - name: Upload bench result
        uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: ./target/criterion
          retention-days: 1

  build-website:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build website
        run: |
          npm ci
          npm run build
        working-directory: ./website

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: ./website/dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build-website, benchmark, integration-test, unit-test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - name: Download bench result        
        uses: actions/download-artifact@v4
        with:
          name: bench-result
          path: out/bench

      - name: Download website Dist
        uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: out/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          commit_message: "[bot] update results ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
